spring:
  application:
    name: eolmago
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
      validation-timeout: 2000
      idle-timeout: 300000
      max-lifetime: 1740000
      keepalive-time: 120000

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        auction.bid.duration: true
        auction.close.duration: true
        auction.close.delay: true

auction:
  runtime:
    bid:
      lock-timeout-ms: 0
      transaction-timeout-sec: 3
    close:
      lock-timeout-ms: 200
      transaction-timeout-sec: 5
    scheduler:
      pool-size: 10
      thread-name-prefix: auction-close-
      await-termination-sec: 30
      sweep-delay-ms: 60000
      sweep-batch-size: 100
